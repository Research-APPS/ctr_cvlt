<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Linktree — ESCENA</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: var(--space-2xl);
      align-items: start;
    }

    /* Mobile sidebar overlay */
    .admin-sidebar-toggle { display: none; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar-toggle { display: inline-flex; }

      .admin-sidebar {
        display: block !important;
        position: fixed;
        top: var(--navbar-height);
        left: 0;
        bottom: 0;
        width: 260px;
        z-index: 150;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        padding: var(--space-lg);
        overflow-y: auto;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .admin-sidebar.open { transform: translateX(0); }

      .admin-sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: var(--navbar-height);
        background: rgba(0,0,0,0.6);
        z-index: 149;
      }

      .admin-sidebar-backdrop.show { display: block; }
    }

    /* Sidebar */
    .admin-sidebar {
      position: sticky;
      top: calc(var(--navbar-height) + var(--space-lg));
    }

    .admin-sidebar__section { margin-bottom: var(--space-lg); }

    .admin-sidebar__label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
    }

    .admin-nav-item:hover { background: var(--bg-surface); color: var(--text-primary); }
    .admin-nav-item.active { background: var(--accent-dim); color: var(--accent); }

    /* Admin header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .admin-header h1 { font-size: var(--text-2xl); }

    /* Public URL banner */
    .lt-url-banner {
      background: var(--accent-dim);
      border: 1px solid rgba(200,255,0,0.25);
      border-radius: var(--radius-xl);
      padding: var(--space-md) var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }

    .lt-url-banner__icon { font-size: 1.5rem; flex-shrink: 0; }

    .lt-url-banner__info { flex: 1; min-width: 0; }

    .lt-url-banner__label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .lt-url-banner__url {
      font-family: 'Courier New', monospace;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      word-break: break-all;
    }

    .lt-url-banner__actions { display: flex; gap: var(--space-sm); flex-shrink: 0; }

    /* Links editor */
    .lt-editor {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: var(--space-xl);
    }

    .lt-editor__header {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
    }

    .lt-editor__title { font-weight: 700; }

    /* Link rows */
    .lt-row {
      display: grid;
      grid-template-columns: auto 48px 1fr auto auto;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .lt-row:last-child { border-bottom: none; }
    .lt-row:hover { background: var(--bg-surface); }
    .lt-row--inactive { opacity: 0.45; }

    .lt-row__order {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lt-row__order button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .lt-row__order button:hover { background: var(--bg-surface); color: var(--text-primary); }

    .lt-row__icon-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    .lt-row__icon-btn:hover { background: var(--bg-card); }

    .lt-row__content { min-width: 0; }

    .lt-row__title {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lt-row__url {
      font-size: var(--text-xs);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Courier New', monospace;
    }

    .lt-row__toggle {
      display: flex;
      align-items: center;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-switch__track {
      position: absolute;
      inset: 0;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-switch__track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .toggle-switch__track {
      background: rgba(200,255,0,0.15);
      border-color: rgba(200,255,0,0.4);
    }

    .toggle-switch input:checked + .toggle-switch__track::after {
      background: var(--accent);
      transform: translateX(18px);
    }

    .lt-row__actions { display: flex; gap: var(--space-xs); }

    /* Empty state */
    .lt-empty-row {
      padding: var(--space-2xl);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    /* Add link form */
    .lt-add-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .lt-add-form__header {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }

    .lt-add-form__body {
      padding: var(--space-lg);
      display: grid;
      grid-template-columns: 80px 1fr 1fr;
      gap: var(--space-md);
      align-items: end;
    }

    @media (max-width: 600px) {
      .lt-add-form__body { grid-template-columns: 1fr; }
      .lt-row { grid-template-columns: auto 40px 1fr auto auto; gap: var(--space-xs); }
      .lt-row__icon-btn { width: 40px; height: 40px; font-size: 1.25rem; }
    }

    .lt-add-form__footer {
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: var(--space-sm);
    }

    /* Preview panel */
    .lt-preview {
      position: sticky;
      top: calc(var(--navbar-height) + var(--space-lg));
    }

    .lt-preview__phone {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .lt-preview__header {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-weight: 600;
    }

    .lt-preview__content {
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      max-height: 480px;
      overflow-y: auto;
    }

    .lt-preview__item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Edit modal */
    .edit-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    .edit-modal-overlay.show { display: flex; }

    .edit-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      width: 100%;
      max-width: 440px;
    }

    .edit-modal h3 { margin-bottom: var(--space-lg); }

    .edit-modal__fields { display: flex; flex-direction: column; gap: var(--space-md); }

    .edit-modal__footer {
      display: flex;
      gap: var(--space-sm);
      justify-content: flex-end;
      margin-top: var(--space-xl);
    }
  </style>
</head>
<body>
  <header class="navbar"></header>

  <div class="admin-sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <main class="page-content">
    <div class="container">
      <div class="admin-layout">

        <!-- ─── Sidebar ─────────────────────────────────── -->
        <aside class="admin-sidebar" id="adminSidebar">
          <div class="admin-sidebar__section">
            <div class="admin-sidebar__label">Panel</div>
            <a class="admin-nav-item" href="index.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              Dashboard
            </a>
            <a class="admin-nav-item" href="event-form.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Crear evento
            </a>
            <a class="admin-nav-item" href="tickets.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/></svg>
              Entradas vendidas
            </a>
            <a class="admin-nav-item" href="scanner.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="21"/></svg>
              Validar entradas
            </a>
            <a class="admin-nav-item active" href="linktree.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
              Mi Linktree
            </a>
          </div>
          <div class="admin-sidebar__section">
            <div class="admin-sidebar__label">Cuenta</div>
            <button class="admin-nav-item" onclick="window.location.href='../index.html'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
              Ver web pública
            </button>
            <button class="admin-nav-item" onclick="Auth.logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </aside>

        <!-- ─── Main content ──────────────────────────── -->
        <div>
          <div class="admin-header">
            <div style="display:flex;align-items:center;gap:var(--space-md)">
              <button class="btn btn--secondary btn--sm admin-sidebar-toggle" onclick="toggleSidebar()">☰ Menú</button>
              <div>
                <h1>Mi Linktree</h1>
                <p class="text-secondary" style="font-size:var(--text-sm)">Gestiona los enlaces de tu página pública</p>
              </div>
            </div>
            <a href="../linktree.html" target="_blank" class="btn btn--primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Ver página pública
            </a>
          </div>

          <!-- Public URL banner -->
          <div class="lt-url-banner">
            <div class="lt-url-banner__icon">🔗</div>
            <div class="lt-url-banner__info">
              <div class="lt-url-banner__label">URL pública de tu Linktree</div>
              <div class="lt-url-banner__url" id="publicUrl">cargando...</div>
            </div>
            <div class="lt-url-banner__actions">
              <button class="btn btn--secondary btn--sm" onclick="copyUrl()">Copiar URL</button>
              <a href="../linktree.html" target="_blank" class="btn btn--ghost btn--sm">Abrir →</a>
            </div>
          </div>

          <!-- Links editor -->
          <div class="lt-editor">
            <div class="lt-editor__header">
              <span class="lt-editor__title">
                Tus enlaces
                <span id="linkCount" style="font-size:var(--text-xs);color:var(--text-muted);font-weight:400;margin-left:var(--space-xs)"></span>
              </span>
              <span style="font-size:var(--text-xs);color:var(--text-muted)">Usa ↑↓ para reordenar</span>
            </div>
            <div id="linksList">
              <div class="lt-empty-row">Cargando...</div>
            </div>
          </div>

          <!-- Add new link form -->
          <div class="lt-add-form">
            <div class="lt-add-form__header">+ Añadir nuevo enlace</div>
            <div class="lt-add-form__body">
              <div>
                <label class="form-label">Icono</label>
                <input class="form-input" id="newIcon" placeholder="🔗" maxlength="4" style="text-align:center;font-size:1.5rem;padding:8px">
              </div>
              <div>
                <label class="form-label">Título del enlace</label>
                <input class="form-input" id="newTitle" placeholder="ej. Instagram">
              </div>
              <div>
                <label class="form-label">URL</label>
                <input class="form-input" id="newUrl" placeholder="https://..." type="url">
              </div>
            </div>
            <div class="lt-add-form__footer">
              <button class="btn btn--primary" onclick="addLink()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Añadir enlace
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- Edit modal -->
  <div class="edit-modal-overlay" id="editModal">
    <div class="edit-modal">
      <h3>Editar enlace</h3>
      <div class="edit-modal__fields">
        <div>
          <label class="form-label">Icono (emoji)</label>
          <input class="form-input" id="editIcon" placeholder="🔗" maxlength="4" style="text-align:center;font-size:1.5rem;padding:8px">
        </div>
        <div>
          <label class="form-label">Título</label>
          <input class="form-input" id="editTitle" placeholder="Título del enlace">
        </div>
        <div>
          <label class="form-label">URL</label>
          <input class="form-input" id="editUrl" placeholder="https://..." type="url">
        </div>
      </div>
      <div class="edit-modal__footer">
        <button class="btn btn--secondary" onclick="closeEditModal()">Cancelar</button>
        <button class="btn btn--primary" onclick="saveEdit()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <footer class="footer"></footer>

  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let editingId = null;

    (async () => {
      UI.renderNavbar({ base: '..', activePage: 'admin' });
      UI.renderFooter({ base: '..' });

      if (!Auth.requireAdmin()) return;

      // Show public URL
      const publicUrl = window.location.origin + window.location.pathname.replace('admin/linktree.html', 'linktree.html');
      document.getElementById('publicUrl').textContent = publicUrl;

      renderLinks();
    })();

    function renderLinks() {
      const links = Store.linktree.get();
      const container = document.getElementById('linksList');
      const count = links.length;
      document.getElementById('linkCount').textContent = `(${count} enlace${count !== 1 ? 's' : ''})`;

      if (!links.length) {
        container.innerHTML = `<div class="lt-empty-row">No tienes enlaces todavía. Añade el primero abajo.</div>`;
        return;
      }

      container.innerHTML = links.map((l, idx) => `
        <div class="lt-row ${!l.active ? 'lt-row--inactive' : ''}" id="row-${l.id}">
          <div class="lt-row__order">
            <button onclick="moveLink('${l.id}','up')" ${idx === 0 ? 'disabled style="opacity:.3"' : ''} title="Subir">▲</button>
            <button onclick="moveLink('${l.id}','down')" ${idx === links.length - 1 ? 'disabled style="opacity:.3"' : ''} title="Bajar">▼</button>
          </div>
          <button class="lt-row__icon-btn" onclick="openEditModal('${l.id}')" title="Editar icono">
            ${l.icon || '🔗'}
          </button>
          <div class="lt-row__content">
            <div class="lt-row__title">${l.title}</div>
            <div class="lt-row__url">${l.url}</div>
          </div>
          <div class="lt-row__toggle">
            <label class="toggle-switch" title="${l.active ? 'Activo — clic para ocultar' : 'Inactivo — clic para activar'}">
              <input type="checkbox" ${l.active ? 'checked' : ''} onchange="toggleLink('${l.id}')">
              <span class="toggle-switch__track"></span>
            </label>
          </div>
          <div class="lt-row__actions">
            <button class="btn btn--ghost btn--sm" onclick="openEditModal('${l.id}')" title="Editar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn--danger btn--sm" onclick="removeLink('${l.id}')" title="Eliminar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`).join('');
    }

    function addLink() {
      const icon  = document.getElementById('newIcon').value.trim() || '🔗';
      const title = document.getElementById('newTitle').value.trim();
      const url   = document.getElementById('newUrl').value.trim();

      if (!title) { UI.toast('Escribe un título para el enlace', 'error'); return; }
      if (!url)   { UI.toast('Escribe una URL', 'error'); return; }

      Store.linktree.add({
        id:     'lt-' + Date.now(),
        icon, title, url,
        active: true,
      });

      document.getElementById('newIcon').value  = '';
      document.getElementById('newTitle').value = '';
      document.getElementById('newUrl').value   = '';

      renderLinks();
      UI.toast('Enlace añadido', 'success');
    }

    function toggleLink(id) {
      Store.linktree.toggle(id);
      renderLinks();
    }

    function moveLink(id, dir) {
      Store.linktree.move(id, dir);
      renderLinks();
    }

    function removeLink(id) {
      Store.linktree.remove(id);
      renderLinks();
      UI.toast('Enlace eliminado', '');
    }

    function openEditModal(id) {
      const link = Store.linktree.get().find(l => l.id === id);
      if (!link) return;
      editingId = id;
      document.getElementById('editIcon').value  = link.icon || '';
      document.getElementById('editTitle').value = link.title;
      document.getElementById('editUrl').value   = link.url;
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      editingId = null;
    }

    function saveEdit() {
      if (!editingId) return;
      const icon  = document.getElementById('editIcon').value.trim() || '🔗';
      const title = document.getElementById('editTitle').value.trim();
      const url   = document.getElementById('editUrl').value.trim();
      if (!title || !url) { UI.toast('Rellena título y URL', 'error'); return; }
      Store.linktree.update(editingId, { icon, title, url });
      closeEditModal();
      renderLinks();
      UI.toast('Enlace actualizado', 'success');
    }

    // Close modal on backdrop click
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEditModal();
    });

    function copyUrl() {
      const url = document.getElementById('publicUrl').textContent;
      navigator.clipboard?.writeText(url)
        .then(() => UI.toast('URL copiada al portapapeles', 'success'))
        .catch(() => UI.toast('No se pudo copiar', 'error'));
    }

    function toggleSidebar() {
      const sidebar  = document.getElementById('adminSidebar');
      const backdrop = document.getElementById('sidebarBackdrop');
      const isOpen   = sidebar.classList.contains('open');
      sidebar.classList.toggle('open', !isOpen);
      backdrop.classList.toggle('show', !isOpen);
      document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 900) {
        const sidebar  = document.getElementById('adminSidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        if (sidebar)  sidebar.classList.remove('open');
        if (backdrop) backdrop.classList.remove('show');
        document.body.style.overflow = '';
      }
    });
  </script>
</body>
</html>
