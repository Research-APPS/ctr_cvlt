<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entradas vendidas — ESCENA</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: var(--space-2xl);
      align-items: start;
    }

    /* Mobile sidebar overlay */
    .admin-sidebar-toggle {
      display: none;
    }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar-toggle { display: inline-flex; }

      .admin-sidebar {
        display: block !important;
        position: fixed;
        top: var(--navbar-height);
        left: 0;
        bottom: 0;
        width: 260px;
        z-index: 150;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        padding: var(--space-lg);
        overflow-y: auto;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .admin-sidebar.open {
        transform: translateX(0);
      }

      .admin-sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: var(--navbar-height);
        background: rgba(0,0,0,0.6);
        z-index: 149;
      }

      .admin-sidebar-backdrop.show { display: block; }
    }

    /* Sidebar */
    .admin-sidebar {
      position: sticky;
      top: calc(var(--navbar-height) + var(--space-lg));
    }

    .admin-sidebar__section {
      margin-bottom: var(--space-lg);
    }

    .admin-sidebar__label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
    }

    .admin-nav-item:hover { background: var(--bg-surface); color: var(--text-primary); }
    .admin-nav-item.active { background: var(--accent-dim); color: var(--accent); }

    /* Admin header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .admin-header h1 { font-size: var(--text-2xl); }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-2xl);
    }

    @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }

    /* Table wrapper */
    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .table-wrapper__header {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    .table-wrapper__title {
      font-weight: 700;
      font-size: var(--text-base);
    }

    .table-scroll { overflow-x: auto; }

    @media (max-width: 768px) {
      .admin-table th,
      .admin-table td { white-space: nowrap; }
    }

    /* Validation badges */
    .badge--valid {
      background: rgba(0,214,123,0.15);
      color: var(--success);
      border: 1px solid rgba(0,214,123,0.3);
    }

    .badge--used {
      background: rgba(255,170,0,0.12);
      color: #ffaa00;
      border: 1px solid rgba(255,170,0,0.25);
    }

    /* Search bar */
    .search-bar {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }

    .search-bar .form-input {
      width: 260px;
    }

    @media (max-width: 600px) {
      .search-bar { flex-direction: column; align-items: stretch; }
      .search-bar .form-input { width: 100%; }
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-lg);
    }

    .breadcrumb a { color: var(--text-secondary); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb__sep { color: var(--border); }
    .breadcrumb__current { color: var(--text-primary); }
  </style>
</head>
<body>
  <header class="navbar"></header>

  <div class="admin-sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <main class="page-content">
    <div class="container">
      <div class="admin-layout">

        <!-- ─── Sidebar ─────────────────────────────────── -->
        <aside class="admin-sidebar" id="adminSidebar">
          <div class="admin-sidebar__section">
            <div class="admin-sidebar__label">Panel</div>
            <a class="admin-nav-item" href="index.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              Dashboard
            </a>
            <a class="admin-nav-item" href="event-form.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Crear evento
            </a>
            <a class="admin-nav-item active" href="tickets.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/></svg>
              Entradas vendidas
            </a>
            <a class="admin-nav-item" href="scanner.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="21"/></svg>
              Validar entradas
            </a>
          </div>
          <div class="admin-sidebar__section">
            <div class="admin-sidebar__label">Cuenta</div>
            <button class="admin-nav-item" onclick="window.location.href='../index.html'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
              Ver web pública
            </button>
            <button class="admin-nav-item" onclick="Auth.logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </aside>

        <!-- ─── Main content ──────────────────────────── -->
        <div>
          <div class="admin-header">
            <div style="display:flex;align-items:center;gap:var(--space-md)">
              <button class="btn btn--secondary btn--sm admin-sidebar-toggle" onclick="toggleSidebar()">☰ Menú</button>
              <div>
                <div class="breadcrumb">
                  <a href="index.html">Dashboard</a>
                  <span class="breadcrumb__sep">/</span>
                  <span class="breadcrumb__current" id="breadcrumbCurrent">Entradas vendidas</span>
                </div>
                <h1 id="pageTitle">Entradas vendidas</h1>
                <p class="text-secondary" id="pageSubtitle" style="font-size:var(--text-sm)">Cargando...</p>
              </div>
            </div>
            <button class="btn btn--secondary" onclick="exportTicketsCSV()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Exportar CSV
            </button>
          </div>

          <!-- Summary stats -->
          <div class="stats-grid" id="summaryStats"></div>

          <!-- Tickets table -->
          <div class="table-wrapper">
            <div class="table-wrapper__header">
              <div class="table-wrapper__title">Órdenes</div>
              <div class="search-bar">
                <input class="form-input" id="searchInput"
                       placeholder="Buscar por nombre, email u orden..."
                       oninput="filterTable()">
              </div>
            </div>
            <div class="table-scroll">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Orden</th>
                    <th>Comprador</th>
                    <th>Email</th>
                    <th>Tipo entrada</th>
                    <th>Cant.</th>
                    <th>Total</th>
                    <th>Fecha compra</th>
                    <th>Estado</th>
                  </tr>
                </thead>
                <tbody id="ticketsTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    window._allPurchases = [];

    (async () => {
      UI.renderNavbar({ base: '..', activePage: 'admin' });
      UI.renderFooter({ base: '..' });

      if (!Auth.requireAdmin()) return;

      await Data.loadAll();

      const eventId   = Data.getURLParam('event');
      const allPurch  = Store.purchases.get();

      window._allPurchases = eventId
        ? allPurch.filter(p => p.event_id === eventId)
        : allPurch;

      // Page title
      const event = eventId ? Data.getEvent(eventId) : null;
      if (event) {
        document.getElementById('pageTitle').textContent = `Entradas: ${event.title}`;
        document.getElementById('breadcrumbCurrent').textContent = event.title;
        document.title = `Entradas: ${event.title} — ESCENA`;
      }

      const count = window._allPurchases.length;
      document.getElementById('pageSubtitle').textContent =
        `${count} orden${count !== 1 ? 'es' : ''} encontrada${count !== 1 ? 's' : ''}`;

      // Summary stats
      const totalQty = window._allPurchases.reduce((s, p) =>
        s + (p.items || []).reduce((ss, i) => ss + i.quantity, 0), 0);
      const totalRev = window._allPurchases.reduce((s, p) => s + (p.total || 0), 0);
      const validations = Store.validations.get();
      const usedCount = window._allPurchases.filter(p => validations[p.id]?.validated).length;

      document.getElementById('summaryStats').innerHTML = `
        <div class="stat-card">
          <div class="stat-card__label">Órdenes</div>
          <div class="stat-card__value">${count}</div>
          <div class="stat-card__sub">total</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Entradas</div>
          <div class="stat-card__value">${totalQty}</div>
          <div class="stat-card__sub">unidades vendidas</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Ingresos</div>
          <div class="stat-card__value">${totalRev.toLocaleString('es-ES', {minimumFractionDigits:2})}€</div>
          <div class="stat-card__sub">${usedCount} validada${usedCount !== 1 ? 's' : ''}</div>
        </div>`;

      renderTable(window._allPurchases);
    })();

    function renderTable(purchases) {
      const validations = Store.validations.get();
      const tbody = document.getElementById('ticketsTableBody');

      if (!purchases.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:var(--space-xl);color:var(--text-muted)">
          No se encontraron entradas.
        </td></tr>`;
        return;
      }

      tbody.innerHTML = purchases.map(p => {
        const isUsed     = validations[p.id]?.validated;
        const badgeClass = isUsed ? 'badge--used' : 'badge--valid';
        const badgeText  = isUsed ? 'Usada' : 'Válida';
        const typeStr    = (p.items || []).map(i => `${i.ticket_type_name} ×${i.quantity}`).join(', ');
        const totalQty   = (p.items || []).reduce((s, i) => s + i.quantity, 0);
        const dateStr    = p.paid_at
          ? new Date(p.paid_at).toLocaleDateString('es-ES', {
              day: '2-digit', month: 'short', year: 'numeric',
              hour: '2-digit', minute: '2-digit'
            })
          : '—';

        return `<tr>
          <td style="font-family:'Courier New',monospace;font-size:var(--text-xs)">${p.id}</td>
          <td>${p.buyer_name || '—'}</td>
          <td style="color:var(--text-muted)">${p.buyer_email || '—'}</td>
          <td>${typeStr || 'Entrada general'}</td>
          <td>${totalQty}</td>
          <td style="font-weight:700">${(p.total || 0).toFixed(2)}€</td>
          <td style="color:var(--text-muted);font-size:var(--text-xs)">${dateStr}</td>
          <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        </tr>`;
      }).join('');
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = window._allPurchases.filter(p =>
        !q ||
        (p.buyer_name || '').toLowerCase().includes(q) ||
        (p.buyer_email || '').toLowerCase().includes(q) ||
        (p.id || '').toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    function exportTicketsCSV() {
      const rows = [['Orden','Comprador','Email','Tipo','Cantidad','Total','Fecha','Estado']];
      const validations = Store.validations.get();
      window._allPurchases.forEach(p => {
        const typeStr  = (p.items || []).map(i => `${i.ticket_type_name}x${i.quantity}`).join(';');
        const totalQty = (p.items || []).reduce((s, i) => s + i.quantity, 0);
        const isUsed   = validations[p.id]?.validated;
        rows.push([p.id, p.buyer_name || '', p.buyer_email || '', typeStr,
                   totalQty, p.total || 0, p.paid_at || '', isUsed ? 'Usada' : 'Válida']);
      });
      const csv  = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'escena-entradas.csv'; a.click();
      URL.revokeObjectURL(url);
      UI.toast('CSV descargado', 'success');
    }

    function toggleSidebar() {
      const sidebar  = document.getElementById('adminSidebar');
      const backdrop = document.getElementById('sidebarBackdrop');
      const isOpen   = sidebar.classList.contains('open');
      sidebar.classList.toggle('open', !isOpen);
      backdrop.classList.toggle('show', !isOpen);
      document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 900) {
        const sidebar  = document.getElementById('adminSidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        sidebar.classList.remove('open');
        backdrop.classList.remove('show');
        document.body.style.overflow = '';
      }
    });
  </script>
</body>
</html>
