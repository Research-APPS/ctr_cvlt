<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — ESCENA</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-md);
      background: radial-gradient(ellipse at 60% 30%, rgba(200,255,0,0.04) 0%, transparent 60%), var(--bg);
    }

    .login-box {
      width: 100%;
      max-width: 420px;
    }

    .login-box__header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }

    .login-box__logo {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--accent);
      display: block;
      margin-bottom: var(--space-md);
    }

    .login-box__title {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-xs);
    }

    .login-box__sub {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
    }

    .demo-users {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .demo-users__label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .demo-user-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition);
      background: none;
      border: none;
      text-align: left;
    }

    .demo-user-btn:hover { background: var(--bg-card); }

    .demo-user-btn .demo-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(200,255,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--text-xs);
      color: var(--accent);
      flex-shrink: 0;
    }

    .demo-user-btn .demo-info { flex: 1; }
    .demo-user-btn .demo-name { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
    .demo-user-btn .demo-role { font-size: var(--text-xs); color: var(--text-muted); }
    .demo-user-btn .demo-fill { font-size: var(--text-xs); color: var(--text-muted); }

    .error-msg {
      background: rgba(255,68,68,0.08);
      border: 1px solid rgba(255,68,68,0.25);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--text-sm);
      color: var(--danger);
      margin-bottom: var(--space-md);
      display: none;
    }

    .error-msg.show { display: block; }

    .form-input.error { border-color: var(--danger); }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      transition: color var(--transition);
    }

    .password-toggle:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-box__header">
        <a href="index.html" class="login-box__logo">ESCENA</a>
        <h1 class="login-box__title">Bienvenido</h1>
        <p class="login-box__sub">Accede a tu cuenta para comprar entradas</p>
      </div>

      <div class="login-card">
        <!-- Demo users shortcuts -->
        <div class="demo-users">
          <div class="demo-users__label">⚡ Usuarios de demostración</div>
          <button class="demo-user-btn" onclick="fillUser('user@demo.com','1234')">
            <div class="demo-avatar">AG</div>
            <div class="demo-info">
              <div class="demo-name">Ana García <span style="color:var(--accent);font-weight:700">· Usuario</span></div>
              <div class="demo-role">user@demo.com · contraseña: 1234</div>
            </div>
            <span class="demo-fill">→ Rellenar</span>
          </button>
          <button class="demo-user-btn" onclick="fillUser('admin@demo.com','1234')">
            <div class="demo-avatar">CL</div>
            <div class="demo-info">
              <div class="demo-name">Carlos López <span style="color:var(--warning);font-weight:700">· Admin</span></div>
              <div class="demo-role">admin@demo.com · contraseña: 1234</div>
            </div>
            <span class="demo-fill">→ Rellenar</span>
          </button>
        </div>

        <div class="divider-label"><span>o introduce tus credenciales</span></div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg">Email o contraseña incorrectos</div>

        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="tu@email.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <div class="password-wrapper">
              <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="password-toggle" onclick="togglePassword()" title="Mostrar/ocultar contraseña">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn--full btn--lg" id="submitBtn" style="margin-top:var(--space-md)">
            Iniciar sesión
          </button>
        </form>

        <p style="text-align:center;margin-top:var(--space-lg);font-size:var(--text-xs);color:var(--text-muted)">
          Plataforma de demostración — Sin datos reales ni pagos
        </p>
      </div>

      <p style="text-align:center;margin-top:var(--space-lg)">
        <a href="index.html" style="font-size:var(--text-sm);color:var(--text-secondary)">← Volver a conciertos</a>
      </p>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Store.user.isLoggedIn()) {
      redirect();
    }

    function redirect() {
      const next = new URLSearchParams(window.location.search).get('next');
      window.location.href = next || 'index.html';
    }

    function fillUser(email, pass) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = pass;
      document.getElementById('email').focus();
    }

    function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      const errMsg   = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errMsg.classList.remove('show');

      // Simulate tiny delay for UX
      setTimeout(() => {
        const result = Auth.login(email, password);
        if (result.ok) {
          btn.textContent = '✓ Accediendo...';
          setTimeout(redirect, 600);
        } else {
          errMsg.textContent = result.error;
          errMsg.classList.add('show');
          document.getElementById('email').classList.add('error');
          document.getElementById('password').classList.add('error');
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
        }
      }, 400);
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Clear error on input
    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id).classList.remove('error');
        document.getElementById('errorMsg').classList.remove('show');
      });
    });
  </script>
</body>
</html>
