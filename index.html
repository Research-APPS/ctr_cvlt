<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCENA — Conciertos y entradas</title>
  <meta name="description" content="Descubre y compra entradas para los mejores conciertos. Sin comisiones de plataformas externas.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ─── Hero ─────────────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 540px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: var(--bg-surface);
      margin-top: var(--navbar-height);
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      opacity: 0.45;
      transition: opacity 0.6s;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10,10,10,0.9) 0%,
        rgba(10,10,10,0.5) 50%,
        rgba(10,10,10,0.2) 100%
      ),
      linear-gradient(to top, rgba(10,10,10,1) 0%, transparent 50%);
    }

    .hero__content {
      position: relative;
      z-index: 1;
      padding: var(--space-3xl) var(--space-lg);
      max-width: 680px;
    }

    .hero__eyebrow {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .hero__eyebrow::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--accent);
    }

    .hero__title {
      font-size: var(--text-5xl);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: var(--space-md);
    }

    .hero__subtitle {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      margin-bottom: var(--space-xl);
    }

    .hero__meta {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }

    .hero__meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .hero__meta-item svg { color: var(--accent); flex-shrink: 0; }

    .hero__cta { display: flex; gap: var(--space-md); flex-wrap: wrap; }

    @media (max-width: 768px) {
      .hero { min-height: 420px; }
      .hero__title { font-size: var(--text-3xl); }
      .hero__content { padding: var(--space-xl) var(--space-md); }
    }

    /* ─── Events section ──────────────────────────────────── */
    .events-section {
      padding: var(--space-2xl) 0;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
    }

    @media (max-width: 900px) { .events-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px) { .events-grid { grid-template-columns: 1fr; } }

    /* ─── Venues section ──────────────────────────────────── */
    .venues-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg);
    }

    .venue-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 16/7;
      cursor: pointer;
      background: var(--bg-surface);
    }

    .venue-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-slow);
      opacity: 0.6;
    }

    .venue-card:hover img { transform: scale(1.04); opacity: 0.8; }

    .venue-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--space-lg);
    }

    .venue-card__city {
      font-size: var(--text-xs);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .venue-card__name {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
    }

    .venue-card__cap {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 4px;
    }

    @media (max-width: 600px) { .venues-grid { grid-template-columns: 1fr; } }

    /* ─── Filter bar ──────────────────────────────────────── */
    .search-bar {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      align-items: center;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--transition);
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-muted); }

    /* ─── No results ──────────────────────────────────────── */
    #noResults {
      grid-column: 1/-1;
    }
  </style>
</head>
<body>
  <header class="navbar" role="banner"></header>

  <!-- HERO (featured event) -->
  <section class="hero" id="hero">
    <img class="hero__bg" id="heroBg" src="" alt="">
    <div class="hero__overlay"></div>
    <div class="container">
      <div class="hero__content">
        <div class="hero__eyebrow">Evento destacado</div>
        <h1 class="hero__title" id="heroTitle">Cargando...</h1>
        <p class="hero__subtitle" id="heroSubtitle"></p>
        <div class="hero__meta" id="heroMeta"></div>
        <div class="hero__cta" id="heroCta"></div>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main>
    <!-- Upcoming events -->
    <section class="events-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Próximos conciertos</h2>
        </div>

        <!-- Filters -->
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Buscar por artista, sala o ciudad...">
        </div>
        <div class="filter-bar" id="filterBar">
          <button class="filter-chip active" data-filter="all">Todos</button>
        </div>

        <!-- Grid -->
        <div class="events-grid" id="eventsGrid">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Past events -->
    <section class="events-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Conciertos pasados</h2>
        </div>
        <div class="events-grid" id="pastGrid"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Venues -->
    <section class="events-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Salas</h2>
        </div>
        <div class="venues-grid" id="venuesGrid"></div>
      </div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (async () => {
      UI.renderNavbar({ base: '.', activePage: 'home' });
      UI.renderFooter({ base: '.' });
      UI.renderDemoBanner();

      await Data.loadAll();

      // ─── Hero ─────────────────────────────────────────────
      const featured = Data.getFeaturedEvent();
      if (featured) {
        const venue = Data.getVenue(featured.venue_id);
        const dt    = Data.formatDateShort(featured.date);

        document.getElementById('heroBg').src = featured.cover_image;
        document.getElementById('heroTitle').textContent = featured.title;
        document.getElementById('heroSubtitle').textContent = featured.subtitle || '';

        document.getElementById('heroMeta').innerHTML = `
          <div class="hero__meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${dt.day} ${dt.month} ${dt.year}
          </div>
          <div class="hero__meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
            ${venue ? venue.name + ' · ' + venue.city : ''}
          </div>
          <div class="hero__meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Puertas: ${featured.time_doors} · Inicio: ${featured.time_start}
          </div>`;

        const minPrice = Data.getMinPrice(featured);
        document.getElementById('heroCta').innerHTML = `
          <a href="event.html?id=${featured.id}" class="btn btn--primary btn--lg">
            Ver evento ${minPrice !== null ? '· desde ' + Data.formatPrice(minPrice) : ''}
          </a>
          <a href="event.html?id=${featured.id}#entradas" class="btn btn--secondary btn--lg">Comprar entradas</a>`;
      }

      // ─── Events grid ──────────────────────────────────────
      const upcoming = Data.getUpcomingEvents();
      const venues   = Data.getVenues();
      const artists  = Data.getArtists();
      const grid     = document.getElementById('eventsGrid');

      function renderGrid(events) {
        if (!events.length) {
          grid.innerHTML = `<div id="noResults" class="empty-state">
            <div class="empty-state__icon">🎵</div>
            <div class="empty-state__title">No hay conciertos con ese filtro</div>
            <p>Prueba a cambiar los filtros o busca otro artista.</p>
          </div>`;
          return;
        }
        grid.innerHTML = events.map(e => Data.renderEventCard(e, venues, artists)).join('');
      }

      renderGrid(upcoming);

      // Past events
      const pastGrid = document.getElementById('pastGrid');
      const past = Data.getPastEvents();
      pastGrid.innerHTML = past.map(e => Data.renderEventCard(e, venues, artists)).join('');

      // ─── Filters ──────────────────────────────────────────
      // Build genre filters
      const genres = [...new Set(upcoming.flatMap(e => e.genres || []))];
      const filterBar = document.getElementById('filterBar');
      genres.forEach(g => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip';
        chip.dataset.filter = g;
        chip.textContent = g;
        filterBar.appendChild(chip);
      });

      // Add city filters
      const cities = [...new Set(upcoming.map(e => {
        const v = venues.find(v => v.id === e.venue_id);
        return v?.city;
      }).filter(Boolean))];
      cities.forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip';
        chip.dataset.city = c;
        chip.textContent = c;
        filterBar.appendChild(chip);
      });

      let activeFilter = 'all';
      let activeCity   = null;
      let searchQuery  = '';

      function applyFilters() {
        let filtered = upcoming;
        if (activeFilter !== 'all') {
          filtered = filtered.filter(e => (e.genres || []).includes(activeFilter));
        }
        if (activeCity) {
          filtered = filtered.filter(e => {
            const v = venues.find(v => v.id === e.venue_id);
            return v?.city === activeCity;
          });
        }
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          filtered = filtered.filter(e => {
            const v = venues.find(v => v.id === e.venue_id);
            return e.title.toLowerCase().includes(q) ||
                   (e.subtitle||'').toLowerCase().includes(q) ||
                   (v?.name||'').toLowerCase().includes(q) ||
                   (v?.city||'').toLowerCase().includes(q);
          });
        }
        renderGrid(filtered);
      }

      filterBar.addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        if (chip.dataset.filter) {
          activeFilter = chip.dataset.filter;
          activeCity = null;
        } else if (chip.dataset.city) {
          activeCity = chip.dataset.city;
          activeFilter = 'all';
        }
        applyFilters();
      });

      document.getElementById('searchInput').addEventListener('input', e => {
        searchQuery = e.target.value.trim();
        applyFilters();
      });

      // ─── Venues ───────────────────────────────────────────
      document.getElementById('venuesGrid').innerHTML = venues.map(v => `
        <a href="venue.html?id=${v.id}" class="venue-card">
          <img src="${v.image}" alt="${v.name}" loading="lazy">
          <div class="venue-card__overlay">
            <div class="venue-card__city">${v.city}</div>
            <div class="venue-card__name">${v.name}</div>
            <div class="venue-card__cap">Aforo: ${v.capacity} personas</div>
          </div>
        </a>`).join('');
    })();
  </script>
</body>
</html>
